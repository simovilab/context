# ingest_telemetry.yaml
# Process: Receive raw vehicle telemetry, validate it, and accept it for downstream processing
# Actors: telemetry_broker (NanoMQ), realtime_engine

- id: ingest_telemetry
  initial: waiting
  context:
    trip_id: null # populated by associateRunContext after validation
    route_id: null # populated by associateRunContext after validation
    discard_reason: null
  states:
    waiting:
      description: Idle, listening for incoming MQTT telemetry messages
      on:
        telemetry_broker.TELEMETRY_RECEIVED:
          - target: validating
            actions:
              - parseMqttPayload
              - checkActiveRun
              - validateCoordinates
              - validateTimestamp

    validating:
      description: Realtime-engine is checking the datum against operational state and geographic/temporal bounds
      on:
        realtime_engine.TELEMETRY_VALIDATED:
          - target: processing
            actions:
              - normalizePayload
              - associateRunContext
        realtime_engine.TELEMETRY_DISCARDED:
          - target: waiting
            actions:
              - setDiscardReason
              - logDiscardedDatum

    processing:
      description: Datum accepted — preparing it for downstream consumption by update_system_state
      on:
        realtime_engine.TELEMETRY_PROCESSED:
          - target: waiting
            actions:
              - markReadyForStateUpdate

- actions:
    parseMqttPayload:
      service: realtime_engine
      description: Extract lat, lon, bearing, speed, timestamp, vehicle_id from raw MQTT message
    checkActiveRun:
      service: realtime_engine
      description: Look up vehicle_id in Redis runs:in_progress — is there an active run for this vehicle?
    validateCoordinates:
      service: realtime_engine
      description: Check coordinates are within expected geographic bounds (e.g., Costa Rica bounding box)
    validateTimestamp:
      service: realtime_engine
      description: Verify timestamp is not stale (>60s old) or in the future
    normalizePayload:
      service: realtime_engine
      description: Apply unit conversions, coordinate precision normalization
    associateRunContext:
      service: realtime_engine
      description: Enrich datum with active run context from Redis (trip_id, route_id)
    setDiscardReason:
      service: realtime_engine
      description: Set discard_reason in context (unknown vehicle, no active run, out of bounds, stale timestamp)
    logDiscardedDatum:
      service: realtime_engine
      description: Log the discarded datum for debugging and auditing
    markReadyForStateUpdate:
      service: realtime_engine
      description: Signal that the datum is ready for downstream consumption by update_system_state

  actors:
    telemetry_broker:
      description: NanoMQ MQTT broker — ingests raw OBE telemetry from vehicles
    realtime_engine:
      description: Real-time reasoning — validates, normalizes, and accepts telemetry for state processing

  guards: {}

  delays: {}
