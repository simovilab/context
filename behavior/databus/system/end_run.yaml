# end_run.yaml
# Process: Terminate an active run (externally via API or internally via realtime-engine)
# Actors: backend, realtime_engine, state (Redis), store (PostgreSQL)

- id: end_run
  initial: waiting
  context:
    run_id: null
    vehicle_id: null
    trigger: null # "external" | "internal"
    reason: null # timeout, trip_complete, anomaly (only set on internal triggers)
  states:
    waiting:
      description: Idle, waiting for a run termination request (external API) or autonomous trigger (internal engine decision)
      on:
        backend.END_RUN_REQUESTED:
          - target: requesting
            actions:
              - validateEndRunRequest
              - setTriggerExternal
              - assignContext
        realtime_engine.END_RUN_TRIGGERED:
          - target: finalizing
            actions:
              - setTriggerInternal
              - setReason
              - assignContext

    requesting:
      description: Backend has validated the API call and is publishing the end run command to RabbitMQ
      on:
        backend.END_RUN_COMMAND_SENT:
          - target: finalizing
            actions:
              - publishEndRunCommand

    finalizing:
      description: Realtime-engine is flushing run and vehicle state from Redis and writing traces to PostgreSQL
      on:
        realtime_engine.RUN_FINALIZED:
          - target: notifying
            actions:
              - removeRunFromActiveSet
              - deleteVehicleKeys
              - deleteRunHash
              - writeTraceData
              - emitFinalizationObservation

    notifying:
      description: Backend is updating the run record and notifying the caller/system of the termination outcome
      on:
        backend.END_RUN_NOTIFICATION_SENT:
          - target: waiting
            actions:
              - updateRunRecord
              - respondToHttpCaller
              - broadcastTermination

- actions:
    validateEndRunRequest:
      service: backend
      description: Validate the HTTP request — run_id exists and the run is currently active
    setTriggerExternal:
      service: backend
      description: Set trigger to "external" in context
    setTriggerInternal:
      service: realtime_engine
      description: Set trigger to "internal" in context
    setReason:
      service: realtime_engine
      description: Set reason in context (timeout, trip_complete, anomaly)
    assignContext:
      service: backend / realtime_engine
      description: Record run_id and vehicle_id in context
    publishEndRunCommand:
      service: backend
      description: Publish end run command to RabbitMQ for realtime-engine
    removeRunFromActiveSet:
      service: realtime_engine
      description: Remove run_id from the runs:in_progress set in Redis
    deleteVehicleKeys:
      service: realtime_engine
      description: Delete vehicle:{id}:position, vehicle:{id}:progression, vehicle:{id}:occupancy from Redis
    deleteRunHash:
      service: realtime_engine
      description: Delete run:{id} hash from Redis
    writeTraceData:
      service: realtime_engine
      description: Write final trace data to PostgreSQL (FSM transitions, event timeline)
    emitFinalizationObservation:
      service: realtime_engine
      description: Emit observation to RabbitMQ confirming run finalization
    updateRunRecord:
      service: backend
      description: Update Run record in PostgreSQL (status → completed or terminated)
    respondToHttpCaller:
      service: backend
      description: Send HTTP response to the original API caller if externally triggered (no-op for internal triggers)
    broadcastTermination:
      service: backend
      description: Broadcast run termination event to interested consumers (Infobús, analytics)

  actors:
    backend:
      description: Django control plane — validates API requests, issues commands, notifies callers
    realtime_engine:
      description: Real-time reasoning — flushes operational state from Redis, writes traces to PostgreSQL

  guards: {}

  delays: {}
